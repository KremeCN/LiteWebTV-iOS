name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build (Device)
        run: |
          xcodebuild \
            -project LiteWebTV.xcodeproj \
            -scheme LiteWebTV \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            -allowProvisioningUpdates

      - name: Build (Simulator)
        run: |
          xcodebuild \
            -project LiteWebTV.xcodeproj \
            -scheme LiteWebTV \
            -sdk iphonesimulator \
            -configuration Release \
            -derivedDataPath build-sim \
            CODE_SIGN_IDENTITY="-"

      - name: Verify Simulator App Bundle
        run: |
          SIM_APP_PATH=$(find build-sim -name "LiteWebTV.app" -type d | head -1)
          echo "App: $SIM_APP_PATH"
          echo "=== Info.plist ==="
          plutil -p "$SIM_APP_PATH/Info.plist"
          echo "=== Bundle ID ==="
          /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$SIM_APP_PATH/Info.plist"

      - name: Run in iOS Simulator & Screenshot
        run: |
          SIM_APP_PATH=$(find build-sim -name "LiteWebTV.app" -type d | head -1)

          # 找一个可用的 iPhone 模拟器
          DEVICE_ID=$(xcrun simctl list devices available -j | \
            python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS' in runtime:
                  for d in devices:
                      if 'iPhone' in d['name'] and d['isAvailable']:
                          print(d['udid'])
                          sys.exit(0)
          ")
          echo "Using simulator: $DEVICE_ID"

          # 启动模拟器
          xcrun simctl boot "$DEVICE_ID" || true
          sleep 5

          # 安装 app
          xcrun simctl install "$DEVICE_ID" "$SIM_APP_PATH"

          # 启动 app
          xcrun simctl launch "$DEVICE_ID" com.kremecn.litewebtv
          echo "App launched, waiting 15 seconds for splash screen + page load..."
          sleep 15

          # 截图 1
          xcrun simctl io "$DEVICE_ID" screenshot screenshot_15s.png
          echo "Screenshot 1 captured at 15s"

          # 再等 15 秒让视频加载
          sleep 15
          xcrun simctl io "$DEVICE_ID" screenshot screenshot_30s.png
          echo "Screenshot 2 captured at 30s"

          # 关闭模拟器
          xcrun simctl shutdown "$DEVICE_ID" || true

      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Simulator-Screenshots
          path: screenshot_*.png

      - name: Package IPA (TrollStore)
        run: |
          APP_PATH=$(find build -name "LiteWebTV.app" -type d | head -1)
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r LiteWebTV.ipa Payload/
          rm -rf Payload/

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiteWebTV-iOS
          path: LiteWebTV.ipa

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: LiteWebTV.ipa
