name: Build iOS IPA

on:
  push:
    branches: [ main ]
    tags: [ '*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build (Device)
        run: |
          xcodebuild \
            -project LiteWebTV.xcodeproj \
            -scheme LiteWebTV \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            -allowProvisioningUpdates

      - name: Build (Simulator)
        run: |
          xcodebuild \
            -project LiteWebTV.xcodeproj \
            -scheme LiteWebTV \
            -sdk iphonesimulator \
            -configuration Release \
            -derivedDataPath build-sim

      - name: Run in iOS Simulator & Screenshot (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          SIM_APP_PATH=$(find build-sim -name "LiteWebTV.app" -type d | head -1)
          echo "App: $SIM_APP_PATH"
          echo "=== Code signature ==="
          codesign -dvv "$SIM_APP_PATH" 2>&1 || true
          # 找一个可用的 iPhone 模拟器
          DEVICE_ID=$(xcrun simctl list devices available -j | \
            python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS' in runtime:
                  for d in devices:
                      if 'iPhone' in d['name'] and d['isAvailable']:
                          print(d['udid'])
                          sys.exit(0)
          ")
          echo "Using simulator: $DEVICE_ID"

          # 启动模拟器
          xcrun simctl boot "$DEVICE_ID" || true
          sleep 5

          # 安装 app
          xcrun simctl install "$DEVICE_ID" "$SIM_APP_PATH"

          # 启动 app 并捕获它的控制台输出
          xcrun simctl launch --console "$DEVICE_ID" com.kremecn.litewebtv > app_console.log 2>&1 &
          
          echo "App launched, waiting 15 seconds for splash screen + page load..."
          sleep 15

          # 截图 1
          xcrun simctl io "$DEVICE_ID" screenshot screenshot_15s.png
          echo "Screenshot 1 captured at 15s"

          # 再等 15 秒让视频加载
          sleep 15
          xcrun simctl io "$DEVICE_ID" screenshot screenshot_30s.png
          echo "Screenshot 2 captured at 30s"

          echo "=== APP CONSOLE OUTPUT ==="
          cat app_console.log || true
          echo "=========================="

          # 关闭模拟器
          xcrun simctl shutdown "$DEVICE_ID" || true

      - name: Upload Screenshots (on tag)
        uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: Simulator-Screenshots
          path: screenshot_*.png

      - name: Prepare Simulator App (Appetize.io)
        run: |
          SIM_APP_PATH=$(find build-sim -name "LiteWebTV.app" -type d | head -1)
          mkdir -p appetize-upload
          cp -R "$SIM_APP_PATH" appetize-upload/

      - name: Package IPA (TrollStore)
        run: |
          APP_PATH=$(find build -name "LiteWebTV.app" -type d | head -1)
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          
          # 默认名称
          IPA_NAME="LiteWebTV.ipa"
          
          # 如果是 tag 触发，提取 tag 名并拼接到文件名中
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
            IPA_NAME="LiteWebTV-${TAG_NAME}.ipa"
          fi
          
          zip -r "$IPA_NAME" Payload/
          rm -rf Payload/
          
          # 将生成的文件名保存到 GitHub Actions环境变量中供后续使用
          echo "IPA_FILENAME=$IPA_NAME" >> $GITHUB_ENV

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiteWebTV-iOS
          path: ${{ env.IPA_FILENAME }}

      - name: Upload Simulator App (for Appetize.io)
        uses: actions/upload-artifact@v4
        with:
          name: LiteWebTV-Simulator
          path: appetize-upload

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: ${{ env.IPA_FILENAME }}
