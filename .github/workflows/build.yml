name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build (Device)
        run: |
          xcodebuild \
            -project LiteWebTV.xcodeproj \
            -scheme LiteWebTV \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            -allowProvisioningUpdates

      - name: Build (Simulator - for Appetize.io)
        run: |
          xcodebuild \
            -project LiteWebTV.xcodeproj \
            -scheme LiteWebTV \
            -sdk iphonesimulator \
            -configuration Release \
            -derivedDataPath build-sim \
            -arch x86_64 -arch arm64 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA (TrollStore)
        run: |
          APP_PATH=$(find build -name "LiteWebTV.app" -type d | head -1)
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r LiteWebTV.ipa Payload/
          rm -rf Payload/

      - name: Prepare Simulator App (Appetize.io)
        run: |
          SIM_APP_PATH=$(find build-sim -name "LiteWebTV.app" -type d | head -1)
          mkdir -p appetize-upload
          cp -r "$SIM_APP_PATH" appetize-upload/

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiteWebTV-iOS
          path: LiteWebTV.ipa

      - name: Upload Simulator App (for Appetize.io)
        uses: actions/upload-artifact@v4
        with:
          name: LiteWebTV-Simulator
          path: appetize-upload

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: LiteWebTV.ipa

