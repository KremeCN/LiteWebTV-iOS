name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build (Device)
        run: |
          xcodebuild \
            -project LiteWebTV.xcodeproj \
            -scheme LiteWebTV \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            -allowProvisioningUpdates

      - name: List available Xcode versions
        run: ls -d /Applications/Xcode*.app

      - name: Build (Simulator - using older Xcode for Appetize.io)
        run: |
          # 选择最旧的 Xcode 以降低 SDK 版本
          OLDEST_XCODE=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | head -1)
          echo "Using Xcode: $OLDEST_XCODE"
          sudo xcode-select -s "$OLDEST_XCODE"
          xcodebuild -version

          xcodebuild \
            -project LiteWebTV.xcodeproj \
            -scheme LiteWebTV \
            -sdk iphonesimulator \
            -configuration Release \
            -derivedDataPath build-sim \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Diagnose Simulator App
        run: |
          echo "=== Finding .app ==="
          SIM_APP_PATH=$(find build-sim -name "LiteWebTV.app" -type d | head -1)
          echo "App path: $SIM_APP_PATH"

          echo ""
          echo "=== App bundle contents ==="
          ls -la "$SIM_APP_PATH/"

          echo ""
          echo "=== Binary architecture ==="
          BINARY="$SIM_APP_PATH/LiteWebTV"
          if [ -f "$BINARY" ]; then
            file "$BINARY"
            lipo -info "$BINARY"
          else
            echo "ERROR: Binary not found at $BINARY"
            echo "Looking for executables:"
            find "$SIM_APP_PATH" -type f -perm +111
          fi

          echo ""
          echo "=== Info.plist ==="
          plutil -p "$SIM_APP_PATH/Info.plist"

          echo ""
          echo "=== CFBundleSupportedPlatforms ==="
          plutil -extract CFBundleSupportedPlatforms json "$SIM_APP_PATH/Info.plist" -o - 2>/dev/null || echo "Key not found"

      - name: Package IPA (TrollStore)
        run: |
          APP_PATH=$(find build -name "LiteWebTV.app" -type d | head -1)
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r LiteWebTV.ipa Payload/
          rm -rf Payload/

      - name: Package Simulator App (Appetize.io)
        run: |
          SIM_APP_PATH=$(find build-sim -name "LiteWebTV.app" -type d | head -1)
          cd "$(dirname "$SIM_APP_PATH")"
          zip -ry LiteWebTV-Simulator.zip "LiteWebTV.app"
          mv LiteWebTV-Simulator.zip "$GITHUB_WORKSPACE/"

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiteWebTV-iOS
          path: LiteWebTV.ipa

      - name: Upload Simulator Zip (for Appetize.io)
        uses: actions/upload-artifact@v4
        with:
          name: LiteWebTV-Simulator
          path: LiteWebTV-Simulator.zip

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: LiteWebTV.ipa
